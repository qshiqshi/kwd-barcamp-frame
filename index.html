<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWD Barcamp 2026 – Ich bin dabei!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Roboto:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: #f5f3f7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    width: 100%;
    background: linear-gradient(135deg, #7a00df 0%, #5a00a8 100%);
    color: #fff;
    text-align: center;
    padding: 1.8rem 1rem 1.3rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(242, 117, 73, 0.3);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40px;
    width: 80px; height: 80px;
    background: rgba(228, 252, 154, 0.2);
    transform: rotate(45deg);
  }
  .header h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
    position: relative; z-index: 1;
  }
  .header p {
    font-size: 1rem;
    opacity: 0.9;
    margin-top: 0.3rem;
    position: relative; z-index: 1;
  }
  .container {
    width: 100%;
    max-width: 480px;
    padding: 1.2rem 1rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .canvas-wrapper {
    width: 100%;
    aspect-ratio: 9/16;
    background: #e0d6e8;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: grab;
    touch-action: none;
    box-shadow: 0 4px 20px rgba(122, 0, 223, 0.15);
  }
  .canvas-wrapper:active { cursor: grabbing; }
  .canvas-wrapper canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    color: #7a00df;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .placeholder.hidden { opacity: 0; }
  .placeholder svg { width: 48px; height: 48px; opacity: 0.5; }
  .placeholder span {
    font-size: 0.95rem;
    opacity: 0.7;
    text-align: center;
    padding: 0 1rem;
  }
  .frame-selector {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .frame-thumb {
    width: 64px;
    height: 114px;
    border-radius: 8px;
    border: 3px solid transparent;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    background: #e0d6e8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .frame-thumb:hover { transform: scale(1.05); }
  .frame-thumb.active {
    border-color: #7a00df;
    box-shadow: 0 2px 12px rgba(122, 0, 223, 0.4);
  }
  .frame-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .controls {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.85rem 1.5rem;
    border: none;
    border-radius: 10px;
    font-family: 'Roboto', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-upload {
    background: #7a00df;
    color: #fff;
    box-shadow: 0 3px 12px rgba(122, 0, 223, 0.3);
  }
  .btn-upload:hover { box-shadow: 0 5px 20px rgba(122, 0, 223, 0.4); }
  .btn-download {
    background: #f27549;
    color: #fff;
    box-shadow: 0 3px 12px rgba(242, 117, 73, 0.3);
  }
  .btn-download:hover { box-shadow: 0 5px 20px rgba(242, 117, 73, 0.4); }
  .btn-download:disabled {
    background: #ccc;
    box-shadow: none;
    cursor: not-allowed;
  }
  .btn-row { display: flex; gap: 0.6rem; }
  .btn-row .btn { flex: 1; }
  .zoom-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .zoom-row label {
    font-size: 0.85rem;
    color: #666;
    white-space: nowrap;
    min-width: 44px;
  }
  .zoom-row input[type="range"] {
    flex: 1;
    accent-color: #7a00df;
    height: 6px;
  }
  .hint {
    font-size: 0.78rem;
    color: #999;
    text-align: center;
    line-height: 1.4;
  }
  .hidden-input { display: none; }
  .footer {
    margin-top: auto;
    padding: 1rem;
    font-size: 0.75rem;
    color: #aaa;
    text-align: center;
  }
  .frame-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    color: #7a00df;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-align: center;
  }
  @media (max-width: 400px) {
    .header h1 { font-size: 1.4rem; }
    .container { padding: 1rem 0.75rem 2rem; }
    .frame-thumb { width: 54px; height: 96px; }
  }
</style>
</head>

  <p>Erstelle deinen persönlichen Teilnehmer-Frame!</p>

        Foto wählen

        PNG laden

    </div>
    <div class="zoom-row">
      <label>Zoom</label>
      <input type="range" id="zoomSlider" min="50" max="300" value="100" step="1">
    </div>
    <p class="hint">Bild per Drag verschieben · Zoom per Slider · Export: 1080 × 1920 px (9:16)</p>
  </div>

  <input type="file" accept="image/*" class="hidden-input" id="fileInput">
</div>

<div class="footer">Deine Bilder bleiben in deinem Browser – nichts wird hochgeladen.</div>

(function() {
  const W = 1080, H = 1920;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrapper = document.getElementById('canvasWrapper');
  const placeholder = document.getElementById('placeholder');
  const fileInput = document.getElementById('fileInput');
  const btnUpload = document.getElementById('btnUpload');
  const btnDownload = document.getElementById('btnDownload');
  const zoomSlider = document.getElementById('zoomSlider');
  const frameSel = document.getElementById('frameSel');

  let img = null;
  let imgX = 0, imgY = 0, imgScale = 100, baseScale = 1;
  let dragging = false, dragStartX = 0, dragStartY = 0, imgStartX = 0, imgStartY = 0;
  let currentFrame = 0;
  const frameImages = [];

  // Load all frame images
  let loadedCount = 0;
  FRAME_DATA.forEach((src, i) => {
    const fimg = new Image();
    fimg.onload = () => {
      frameImages[i] = fimg;
      loadedCount++;
      if (loadedCount === FRAME_DATA.length) render();
    };
    fimg.src = src;

    // Create thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'frame-thumb' + (i === 0 ? ' active' : '');
    const timg = document.createElement('img');
    timg.src = src;
    thumb.appendChild(timg);
    thumb.addEventListener('click', () => {
      currentFrame = i;
      document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      render();
    });
    frameSel.appendChild(thumb);
  });

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#e0d6e8';
    ctx.fillRect(0, 0, W, H);

    if (img) {
      const scale = baseScale * (imgScale / 100);
      const w = img.naturalWidth * scale;
      const h = img.naturalHeight * scale;
      ctx.drawImage(img, imgX, imgY, w, h);
    }

    if (frameImages[currentFrame]) {
      ctx.drawImage(frameImages[currentFrame], 0, 0, W, H);
    }
  }

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const image = new Image();
      image.onload = function() {
        img = image;
        const scaleW = W / img.naturalWidth;
        const scaleH = H / img.naturalHeight;
        baseScale = Math.max(scaleW, scaleH);
        imgScale = 100;
        zoomSlider.value = 100;
        const w = img.naturalWidth * baseScale;
        const h = img.naturalHeight * baseScale;
        imgX = (W - w) / 2;
        imgY = (H - h) / 2;
        placeholder.classList.add('hidden');
        btnDownload.disabled = false;
        render();
      };
      image.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Upload
  btnUpload.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  // Drag & drop
  wrapper.addEventListener('dragover', (e) => e.preventDefault());
  wrapper.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  // Pan (mouse)
  function getScale() { return W / wrapper.getBoundingClientRect().width; }

  wrapper.addEventListener('mousedown', (e) => {
    if (!img) return;
    dragging = true;
    const s = getScale();
    dragStartX = e.clientX * s; dragStartY = e.clientY * s;
    imgStartX = imgX; imgStartY = imgY;
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const s = getScale();
    imgX = imgStartX + (e.clientX * s - dragStartX);
    imgY = imgStartY + (e.clientY * s - dragStartY);
    render();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // Pan (touch)
  wrapper.addEventListener('touchstart', (e) => {
    if (!img || e.touches.length !== 1) return;
    dragging = true;
    const s = getScale();
    dragStartX = e.touches[0].clientX * s; dragStartY = e.touches[0].clientY * s;
    imgStartX = imgX; imgStartY = imgY;
  }, { passive: true });
  wrapper.addEventListener('touchmove', (e) => {
    if (!dragging || e.touches.length !== 1) return;
    e.preventDefault();
    const s = getScale();
    imgX = imgStartX + (e.touches[0].clientX * s - dragStartX);
    imgY = imgStartY + (e.touches[0].clientY * s - dragStartY);
    render();
  }, { passive: false });
  wrapper.addEventListener('touchend', () => { dragging = false; });

  // Zoom
  zoomSlider.addEventListener('input', (e) => {
    if (!img) return;
    const oldScale = baseScale * (imgScale / 100);
    imgScale = parseInt(e.target.value);
    const newScale = baseScale * (imgScale / 100);
    const cx = W / 2, cy = H / 2;
    imgX = cx - (cx - imgX) * (newScale / oldScale);
    imgY = cy - (cy - imgY) * (newScale / oldScale);
    render();
  });

  // Download
  btnDownload.addEventListener('click', () => {
    if (!img) return;
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'kwd-barcamp-2026-ich-bin-dabei.png';
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  render();
})();
</script>
