<style>

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Roboto',sans-serif;background:#f5f3f7;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  .header{width:100%;background:linear-gradient(135deg,#7a00df 0%,#5a00a8 100%);color:#fff;text-align:center;padding:1.5rem 1rem 1.2rem;position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(242,117,73,.3)}
  .header::after{content:'';position:absolute;bottom:-20px;left:40px;width:80px;height:80px;background:rgba(228,252,154,.2);transform:rotate(45deg)}
  .header h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:.02em;position:relative;z-index:1}
  .header p{font-size:.9rem;opacity:.9;margin-top:.2rem;position:relative;z-index:1}
  .upload-bar{padding:1rem 1rem .3rem;width:100%;max-width:960px;display:flex;justify-content:center}
  .panels{width:100%;max-width:960px;padding:.8rem 1rem 1.5rem;display:flex;gap:1.2rem;align-items:flex-start;justify-content:center}
  .panel{flex:1;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:.6rem}
  .panel-label{font-family:'Poppins',sans-serif;font-weight:700;font-size:.8rem;color:#7a00df;text-transform:uppercase;letter-spacing:.05em}
  .canvas-wrap{width:100%;background:#e0d6e8;border-radius:10px;overflow:hidden;position:relative;cursor:grab;touch-action:none;box-shadow:0 4px 20px rgba(122,0,223,.15)}
  .canvas-wrap:active{cursor:grabbing}
  .canvas-wrap.r1{aspect-ratio:1}
  .canvas-wrap.r916{aspect-ratio:9/16}
  .canvas-wrap canvas{width:100%;height:100%;display:block}
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;color:#7a00df;pointer-events:none;transition:opacity .3s}
  .ph.hidden{opacity:0}
  .ph svg{width:40px;height:40px;opacity:.5}
  .ph span{font-size:.82rem;opacity:.7;text-align:center;padding:0 .5rem}
  .frame-sel{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
  .frame-label{font-family:'Poppins',sans-serif;font-weight:600;font-size:.75rem;color:#7a00df;text-transform:uppercase;letter-spacing:.04em;text-align:center}
  .ft{width:48px;border-radius:6px;border:3px solid transparent;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .15s;background:#e0d6e8;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .ft.sq{height:48px}
  .ft.vt{height:85px}
  .ft:hover{transform:scale(1.08)}
  .ft.active{border-color:#7a00df;box-shadow:0 2px 12px rgba(122,0,223,.4)}
  .ft img{width:100%;height:100%;object-fit:cover}
  .ctrl{width:100%;display:flex;flex-direction:column;gap:.5rem}
  .zoom-row{display:flex;align-items:center;gap:.6rem}
  .zoom-row label{font-size:.8rem;color:#666;white-space:nowrap;min-width:38px}
  .zoom-row input[type="range"]{flex:1;accent-color:#7a00df;height:6px}
  .btn{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1rem;border:none;border-radius:9px;font-family:'Roboto',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .btn:active{transform:scale(.97)}
  .btn-upload{background:#7a00df;color:#fff;box-shadow:0 3px 12px rgba(122,0,223,.3)}
  .btn-upload:hover{box-shadow:0 5px 20px rgba(122,0,223,.4)}
  .btn-dl{background:#f27549;color:#fff;box-shadow:0 3px 10px rgba(242,117,73,.3);font-size:.82rem;padding:.55rem .8rem}
  .btn-dl:hover{box-shadow:0 5px 16px rgba(242,117,73,.4)}
  .btn-dl:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}
  .hint{font-size:.72rem;color:#999;text-align:center;line-height:1.4;padding:0 1rem}
  .hidden-input{display:none}
  .footer{margin-top:auto;padding:.8rem;font-size:.72rem;color:#aaa;text-align:center}
  @media(max-width:720px){
    .panels{flex-direction:column;align-items:center}
    .panel{max-width:380px}
    .header h1{font-size:1.3rem}
  }
</style>
</head>

</div>

(function(){
  function editor(cvId, wrapId, phId, zId, dlId, fselId, frameSrcs, W, H, fname, thumbClass) {
    const cv = document.getElementById(cvId);
    const ctx = cv.getContext('2d');
    const wrap = document.getElementById(wrapId);
    const ph = document.getElementById(phId);
    const zSlider = document.getElementById(zId);
    const dlBtn = document.getElementById(dlId);
    const fsel = document.getElementById(fselId);

    let img=null, imgX=0, imgY=0, imgScale=100, baseScale=1;
    let dragging=false, dsx=0, dsy=0, isx=0, isy=0;
    let curFrame=0;
    const fImgs=[];

    let loaded=0;
    frameSrcs.forEach(function(src,i){
      var fi=new Image();
      fi.onload=function(){ fImgs[i]=fi; loaded++; if(loaded===frameSrcs.length) render(); };
      fi.src=src;
      var t=document.createElement('div');
      t.className='ft '+thumbClass+(i===0?' active':'');
      var ti=document.createElement('img');
      ti.src=src; t.appendChild(ti);
      t.addEventListener('click',function(){
        curFrame=i;
        fsel.querySelectorAll('.ft').forEach(function(x){x.classList.remove('active')});
        t.classList.add('active');
        render();
      });
      fsel.appendChild(t);
    });

    function render(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#e0d6e8';
      ctx.fillRect(0,0,W,H);
      if(img){
        var sc=baseScale*(imgScale/100);
        ctx.drawImage(img,imgX,imgY,img.naturalWidth*sc,img.naturalHeight*sc);
      }
      if(fImgs[curFrame]) ctx.drawImage(fImgs[curFrame],0,0,W,H);
    }

    function setImage(image){
      img=image;
      var sw=W/img.naturalWidth, sh=H/img.naturalHeight;
      baseScale=Math.max(sw,sh);
      imgScale=100; zSlider.value=100;
      var w=img.naturalWidth*baseScale, h=img.naturalHeight*baseScale;
      imgX=(W-w)/2; imgY=(H-h)/2;
      ph.classList.add('hidden');
      dlBtn.disabled=false;
      render();
    }

    function gs(){ return W/wrap.getBoundingClientRect().width; }

    wrap.addEventListener('mousedown',function(e){if(!img)return;dragging=true;var s=gs();dsx=e.clientX*s;dsy=e.clientY*s;isx=imgX;isy=imgY});
    window.addEventListener('mousemove',function(e){if(!dragging)return;var s=gs();imgX=isx+(e.clientX*s-dsx);imgY=isy+(e.clientY*s-dsy);render()});
    window.addEventListener('mouseup',function(){dragging=false});

    wrap.addEventListener('touchstart',function(e){if(!img||e.touches.length!==1)return;dragging=true;var s=gs();dsx=e.touches[0].clientX*s;dsy=e.touches[0].clientY*s;isx=imgX;isy=imgY},{passive:true});
    wrap.addEventListener('touchmove',function(e){if(!dragging||e.touches.length!==1)return;e.preventDefault();var s=gs();imgX=isx+(e.touches[0].clientX*s-dsx);imgY=isy+(e.touches[0].clientY*s-dsy);render()},{passive:false});
    wrap.addEventListener('touchend',function(){dragging=false});

    zSlider.addEventListener('input',function(e){
      if(!img)return;
      var os=baseScale*(imgScale/100);
      imgScale=parseInt(e.target.value);
      var ns=baseScale*(imgScale/100);
      var cx=W/2,cy=H/2;
      imgX=cx-(cx-imgX)*(ns/os);
      imgY=cy-(cy-imgY)*(ns/os);
      render();
    });

    dlBtn.addEventListener('click',function(){
      if(!img)return;
      cv.toBlob(function(blob){
        var u=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=u;a.download=fname;a.click();
        URL.revokeObjectURL(u);
      },'image/png');
    });

    wrap.addEventListener('dragover',function(e){e.preventDefault()});
    wrap.addEventListener('drop',function(e){
      e.preventDefault();
      var f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/')) loadFile(f);
    });

    render();
    return {setImage:setImage};
  }

  var sq=editor('cvSq','wrapSq','phSq','zSq','dlSq','fselSq',FRAMES_SQ,1080,1080,'kwd-barcamp-2026-1x1.png','sq');
  var vt=editor('cvVt','wrapVt','phVt','zVt','dlVt','fselVt',FRAMES_VT,1080,1920,'kwd-barcamp-2026-9x16.png','vt');

  var fileInput=document.getElementById('fileInput');
  document.getElementById('btnUpload').addEventListener('click',function(){fileInput.click()});
  fileInput.addEventListener('change',function(e){if(e.target.files[0])loadFile(e.target.files[0])});

  document.body.addEventListener('dragover',function(e){e.preventDefault()});
  document.body.addEventListener('drop',function(e){
    e.preventDefault();
    var f=e.dataTransfer.files[0];
    if(f&&f.type.startsWith('image/'))loadFile(f);
  });

  function loadFile(file){
    var r=new FileReader();
    r.onload=function(ev){
      var i=new Image();
      i.onload=function(){sq.setImage(i);vt.setImage(i)};
      i.src=ev.target.result;
    };
    r.readAsDataURL(file);
  }
})();
</script>
